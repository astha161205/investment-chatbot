<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Portfolio Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <style>
        body {
            background-color: white;
        }
    </style>
    <div class="container">
        <div class="row">
            <!-- Portfolio Summary -->
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header">
                        <h4><i class="fas fa-chart-pie me-2"></i>Portfolio Summary</h4>
                    </div>
                    <div class="card-body">
                        <div id="portfolio-summary"></div>
                    </div>
                </div>
                
                <!-- Market Updates -->
                <div class="card">
                    <div class="card-header">
                        <h4><i class="fas fa-chart-line me-2"></i>Market Updates</h4>
                    </div>
                    <div class="card-body">
                        <div id="market-updates"></div>
                    </div>
                </div>
            </div>

            <!-- Chatbot Interface -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h4><i class="fas fa-robot me-2"></i>Investment Assistant</h4>
                    </div>
                    <div class="card-body p-0">
                        <div id="chat-messages" class="chat-messages"></div>
                        <div class="chat-input">
                            <input type="text" id="user-input" placeholder="Ask about stocks, crypto, or your portfolio..." class="form-control">
                            <button onclick="sendMessage()" class="btn btn-primary">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
